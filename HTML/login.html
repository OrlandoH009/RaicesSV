<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raíces SV — Iniciar Sesión</title>
  <link rel="stylesheet" href="../CSS/global.css" />
  <link rel="stylesheet" href="../CSS/login.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="navbar__logo"><a href="index.html"><img src="https://www.figma.com/api/mcp/asset/e14d91cf-7e6d-4d88-9e97-704b9162b473" alt="Logo Raíces SV" /></a></div>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="categorias.html">Categorías</a></li>
      <li><a href="mapa.html">Mapa</a></li>
    </ul>
    <button class="navbar__burger" id="burger" aria-label="Abrir menú"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>
  <nav class="nav-drawer" id="navDrawer">
    <div class="nav-drawer__head"><span>Menú</span></div>
    <a href="sitios-culturales.html" class="drawer-link">🏛 Sitios Culturales</a>
    <a href="gastronomia.html" class="drawer-link">🍽 Gastronomía</a>
    <a href="eventos.html" class="drawer-link">🎉 Eventos Culturales</a>
    <a href="historia.html" class="drawer-link">📜 Historia</a>
    <a href="quiz.html" class="drawer-link">🧠 Quiz Cultural</a>
    <div class="drawer-divider"></div>
    <div class="drawer-auth">
      <p class="drawer-auth-label">Mi cuenta</p>
      <a href="login.html" class="btn-login">Iniciar Sesión</a>
      <a href="registro.html" class="btn-register">Registrarse</a>
    </div>
  </nav>

  <!-- Fondo semitransparente -->
  <div class="auth-page__bg"></div>

  <main class="auth-page">
    <div class="auth-card reveal">
      <div class="auth-card__logo">
        <img src="https://www.figma.com/api/mcp/asset/e14d91cf-7e6d-4d88-9e97-704b9162b473" alt="Logo Raíces SV" />
      </div>
      <h1>Iniciar Sesión</h1>
      <p class="auth-card__sub">Nuestra herencia, nuestro orgullo.</p>

      <form action="#" method="post" onsubmit="return false;">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-submit">Entrar</button>
      </form>

      <div class="auth-divider"><span>¿Aún no tienes cuenta?</span></div>

      <p class="auth-footer-link">
        Regístrate gratis → <a href="registro.html">Crear cuenta</a>
      </p>
    </div>
  </main>

  <script src="../JS/script.js"></script>
</body>
</html>
